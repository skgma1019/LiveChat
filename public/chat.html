<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채팅 - LiveChat</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="chat">
  <div class="app-shell">
    <section id="statusBar" class="status-bar hidden"></section>

    <section class="dashboard">
      <div class="stack">
        <div class="card panel">
          <h2>내 정보</h2>
          <div class="profile-box">
            <div class="info-chip"><span>닉네임</span><strong id="profileNickname">-</strong></div>
            <div class="info-chip"><span>아이디</span><strong id="profileUsername">-</strong></div>
            <div class="info-chip"><span>현재 방</span><strong id="profileRoom">없음</strong></div>
            <div class="info-chip"><span>권한</span><strong id="profileRole">참가자</strong></div>
          </div>
          <div class="button-row">
            <button id="logoutBtn" class="secondary" type="button">로그아웃</button>
          </div>
        </div>

        <div class="card panel">
          <h2>방 만들기</h2>
          <div class="room-actions">
            <div>
              <label for="createRoomTitle">방 제목</label>
              <input id="createRoomTitle" type="text" placeholder="예: 우리 팀 회의방" />
            </div>
            <button id="createRoomBtn" type="button">방 만들기</button>
          </div>
        </div>

        <div class="card panel">
          <h2>방 참가</h2>
          <div class="room-actions">
            <div>
              <label for="joinRoomCode">방 코드</label>
              <input id="joinRoomCode" type="text" placeholder="예: A1B2C3" maxlength="6" />
            </div>
            <button id="joinRoomBtn" type="button">입장하기</button>
          </div>
        </div>

        <div class="card panel">
          <div class="tab-bar">
            <button class="tab active" data-tab="saved" type="button">내가 만든 방</button>
            <button class="tab" data-tab="recent" type="button">최근 방</button>
          </div>
          <ul id="savedRooms" class="saved-list tab-content" data-tab="saved"></ul>
          <ul id="recentRooms" class="saved-list tab-content hidden" data-tab="recent"></ul>
        </div>
      </div>

      <div class="card chat-card kakao-chat-shell">
        <div class="chat-head kakao-chat-head">
          <div>
            <h2 id="roomTitle">방에 아직 입장하지 않았습니다.</h2>
            <p class="muted" id="roomSubtitle">로그인 후 방을 만들거나, 방 코드로 참가해주세요.</p>
          </div>
          <div class="top-inline">
            <span id="roomCodeBadge" class="badge hidden"></span>
            <span id="hostBadge" class="badge hidden">방장</span>
            <button id="leaveRoomBtn" class="secondary leave-btn" type="button" disabled>나가기</button>
          </div>
        </div>

        <div id="chatGuide" class="chat-guide">
          <span>왼쪽에서 방을 만들거나 최근 방을 눌러 대화를 시작하세요.</span>
        </div>

        <div class="chat-layout">
          <aside class="card panel room-sidebar">
            <h3>접속자</h3>
            <ul id="usersList" class="user-list"></ul>
          </aside>

          <section class="message-board kakao-message-board">
            <ul id="messageList" class="message-list"></ul>
          </section>
        </div>

        <div class="kakao-composer">
          <div class="composer-main">
            <label for="imageInput" class="attach-btn" title="사진/동영상 첨부" tabindex="0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </label>
            <input id="imageInput" type="file" accept="image/*,video/*" class="sr-only" />
            <input id="messageInput" type="text" placeholder="메시지를 입력하세요." maxlength="5000" />
            <button id="sendBtn" type="button" class="send-btn">전송</button>
          </div>
          <div class="composer-meta">
            <div id="imagePreviewRow" class="image-preview-row hidden">
              <span id="imagePreviewText"></span>
              <button id="clearImageBtn" class="text-btn" type="button">✕ 해제</button>
            </div>
            <span class="muted" id="messageLengthHint">0 / 5000자</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
