<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채팅 테스트</title>
  <style>
    :root {
      --bg: #f7efe5;
      --card: #fffaf4;
      --line: #dccbb8;
      --ink: #2f241d;
      --accent: #c8643b;
      --accent-dark: #8f3f22;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(200, 100, 59, 0.18), transparent 32%),
        linear-gradient(180deg, #fff7ef 0%, var(--bg) 100%);
    }

    .layout {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .panel {
      background: rgba(255, 250, 244, 0.96);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(82, 49, 31, 0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    input, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 15px;
    }

    input {
      border: 1px solid var(--line);
      background: #fff;
    }

    button {
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .status {
      margin-bottom: 16px;
      font-size: 14px;
    }

    .content {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 16px;
    }

    .sidebar ul,
    .messages {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .sidebar li,
    .messages li {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.82);
    }

    .sidebar li + li,
    .messages li + li {
      margin-top: 10px;
    }

    .messages {
      min-height: 360px;
      max-height: 480px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
      font-size: 12px;
      color: #735748;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 12px;
    }

    .empty {
      color: #8c7467;
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .content {
        grid-template-columns: 1fr;
      }

      .composer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="panel">
      <h1>실시간 채팅</h1>

      <div class="topbar">
        <div>
          <label for="name">닉네임</label>
          <input id="name" placeholder="닉네임 입력" />
        </div>
        <div>
          <label for="room">채팅방</label>
          <input id="room" placeholder="예: lobby, team-a" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="joinBtn" type="button">방 입장</button>
        </div>
      </div>

      <div class="status" id="status">닉네임과 채팅방을 입력한 뒤 입장해주세요.</div>

      <div class="content">
        <aside class="panel sidebar">
          <h2>접속자 목록</h2>
          <ul id="users">
            <li class="empty">현재 접속자가 없습니다.</li>
          </ul>
        </aside>

        <section class="panel">
          <h2>대화</h2>
          <ul class="messages" id="chat">
            <li class="empty">메시지가 아직 없습니다.</li>
          </ul>
          <div class="composer">
            <input id="msg" placeholder="메시지 입력" />
            <button id="sendBtn" type="button">전송</button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io("/", {
      transports: ["websocket"]
    });

    const nameInput = document.getElementById("name");
    const roomInput = document.getElementById("room");
    const msgInput = document.getElementById("msg");
    const chatList = document.getElementById("chat");
    const usersList = document.getElementById("users");
    const statusEl = document.getElementById("status");

    let currentUser = {
      nickname: localStorage.getItem("chat:nickname") || "",
      room: localStorage.getItem("chat:room") || "lobby"
    };

    nameInput.value = currentUser.nickname;
    roomInput.value = currentUser.room;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showEmptyState(list, text) {
      list.innerHTML = "";
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = text;
      list.appendChild(li);
    }

    function formatTime(dateText) {
      return new Date(dateText).toLocaleTimeString("ko-KR", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderMessage(msg) {
      const emptyNode = chatList.querySelector(".empty");
      if (emptyNode) {
        emptyNode.remove();
      }

      const li = document.createElement("li");
      li.innerHTML = `
        <div class="meta">
          <strong>${msg.sender}</strong>
          <span>${formatTime(msg.createdAt || new Date())}</span>
        </div>
        <div>${msg.text}</div>
      `;
      chatList.appendChild(li);
      chatList.scrollTop = chatList.scrollHeight;
    }

    function joinRoom() {
      const nickname = nameInput.value.trim();
      const room = roomInput.value.trim() || "lobby";

      if (!nickname) {
        setStatus("닉네임을 입력해주세요.");
        nameInput.focus();
        return;
      }

      currentUser = { nickname, room };
      localStorage.setItem("chat:nickname", nickname);
      localStorage.setItem("chat:room", room);
      socket.emit("user:join", currentUser);
      setStatus(`"${room}" 방에 입장 중입니다...`);
    }

    function send() {
      const text = msgInput.value.trim();

      if (!currentUser.nickname) {
        setStatus("먼저 닉네임과 채팅방을 설정해주세요.");
        return;
      }

      if (!text) {
        return;
      }

      socket.emit("chat:send", { text });
      msgInput.value = "";
      msgInput.focus();
    }

    document.getElementById("joinBtn").addEventListener("click", joinRoom);
    document.getElementById("sendBtn").addEventListener("click", send);

    msgInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        send();
      }
    });

    roomInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        joinRoom();
      }
    });

    socket.on("connect", () => {
      if (nameInput.value.trim()) {
        joinRoom();
      }
    });

    socket.on("user:profile", (profile) => {
      currentUser = {
        nickname: profile.nickname,
        room: profile.room
      };
      nameInput.value = profile.nickname;
      roomInput.value = profile.room;
      setStatus(`"${profile.room}" 방에 ${profile.nickname} 님으로 접속 중입니다.`);
    });

    socket.on("chat:history", (messages) => {
      if (!messages.length) {
        showEmptyState(chatList, "이 방에는 아직 메시지가 없습니다.");
        return;
      }

      chatList.innerHTML = "";
      messages.forEach(renderMessage);
    });

    socket.on("chat:receive", (msg) => {
      renderMessage(msg);
    });

    socket.on("room:users", (users) => {
      if (!users.length) {
        showEmptyState(usersList, "현재 접속자가 없습니다.");
        return;
      }

      usersList.innerHTML = "";
      users.forEach((user) => {
        const li = document.createElement("li");
        li.textContent = `${user.nickname}${user.socketId === socket.id ? " (나)" : ""}`;
        usersList.appendChild(li);
      });
    });

    socket.on("chat:error", (message) => {
      setStatus(message);
    });
  </script>
</body>
</html>
